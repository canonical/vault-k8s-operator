name: Scan UV dependencies

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering

jobs:
  scan-k8s:
    permissions:
      security-events: write
      actions: read
      contents: read
    uses: canonical/identity-credentials-workflows/.github/workflows/uv-scan.yaml@v2.0.6
    with:
      path: ./k8s
  scan-machine:
    permissions:
      security-events: write
      actions: read
      contents: read
    uses: canonical/identity-credentials-workflows/.github/workflows/uv-scan.yaml@v2.0.6
    with:
      path: ./machine
