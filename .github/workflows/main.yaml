name: CI

on:
  pull_request:
    branches: ["main", "release-*"]
  push:
    branches: ["main", "release-*"]

concurrency:
  group: ${{ (github.ref == 'refs/heads/main' && format('ignore-main-{0}', github.run_id)) || (contains(github.ref, 'refs/heads/release-') && format('ignore-release-{0}', github.run_id)) || format('{0}-{1}', github.workflow, github.ref_name) }}
  cancel-in-progress: true

jobs:
  k8s-lint-report:
    uses: canonical/identity-credentials-workflows/.github/workflows/lint-report.yaml@v1
    with:
      path: ./k8s/

  k8s-grafana-dashboard-lint-report:
    uses: canonical/identity-credentials-workflows/.github/workflows/grafana-dashboard-lint-report.yaml@v1
    with:
      path: ./k8s/src/grafana_dashboards/*

  k8s-static-analysis:
    uses: canonical/identity-credentials-workflows/.github/workflows/static-analysis.yaml@v1
    with:
      path: ./k8s/

  k8s-unit-tests-with-coverage:
    uses: canonical/identity-credentials-workflows/.github/workflows/unit-test.yaml@v1
    with:
      path: ./k8s/

  k8s-build:
    needs:
      - k8s-lint-report
      - k8s-static-analysis
      - k8s-unit-tests-with-coverage
    uses: canonical/identity-credentials-workflows/.github/workflows/build-charm-amd.yaml@v1
    secrets: inherit
    with:
      path: k8s
      artifact-suffix: k8s

  k8s-build-kv-requirer:
    needs:
      - k8s-lint-report
      - k8s-static-analysis
      - k8s-unit-tests-with-coverage
    uses: ./.github/workflows/build-kv-requirer.yaml
    secrets: inherit
    with:
      path: ./k8s/
      artifact-name: kv-requirer-k8s-charm

  k8s-integration-test:
    needs:
      - k8s-build
      - k8s-build-kv-requirer
    uses: ./.github/workflows/k8s-integration-test.yaml
    with:
      path: ./k8s/
      vault-charm-artifact-name: ${{ needs.k8s-build.outputs.artifacts-key }}
      kv-requirer-charm-artifact-name: kv-requirer-k8s-charm

  k8s-publish-charm:
    name: Publish K8s Charm
    runs-on: ubuntu-24.04
    needs:
      - k8s-lint-report
      - k8s-grafana-dashboard-lint-report
      - k8s-static-analysis
      - k8s-unit-tests-with-coverage
      - k8s-integration-test
      - k8s-build
      - k8s-build-kv-requirer
    if: ${{ (github.ref_name == 'main' || startsWith(github.ref_name, 'release-')) && needs.k8s-build.outputs.charm-paths != '' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download charm artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.k8s-build.outputs.artifacts-key }}
          path: k8s

      - name: Install charmcraft
        run: sudo snap install charmcraft --classic --channel latest/stable

      - name: Upload charm to Charmhub
        uses: canonical/charming-actions/upload-charm@2.7.0
        with:
          credentials: ${{ secrets.CHARMCRAFT_AUTH }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          channel: 1.16/edge
          destructive-mode: false
          charm-path: k8s
          built-charm-path: ${{ needs.k8s-build.outputs.charm-paths }}
          github-tag: true
          tag-prefix: k8s

  machine-lint-report:
    uses: canonical/identity-credentials-workflows/.github/workflows/lint-report.yaml@v1
    with:
      path: ./machine/

  machine-grafana-dashboard-lint-report:
    uses: canonical/identity-credentials-workflows/.github/workflows/grafana-dashboard-lint-report.yaml@v1
    with:
      path: ./machine/src/grafana_dashboards/*

  machine-static-analysis:
    uses: canonical/identity-credentials-workflows/.github/workflows/static-analysis.yaml@v1
    with:
      path: ./machine/

  machine-unit-tests-with-coverage:
    uses: canonical/identity-credentials-workflows/.github/workflows/unit-test.yaml@v1
    with:
      path: ./machine/

  machine-build:
    needs:
      - machine-lint-report
      - machine-static-analysis
      - machine-unit-tests-with-coverage
    uses: canonical/identity-credentials-workflows/.github/workflows/build-charm-amd.yaml@v1
    secrets: inherit
    with:
      path: machine
      artifact-suffix: machine

  machine-build-kv-requirer:
    needs:
      - machine-lint-report
      - machine-static-analysis
      - machine-unit-tests-with-coverage
    uses: ./.github/workflows/build-kv-requirer.yaml
    secrets: inherit
    with:
      path: ./machine/
      artifact-name: kv-requirer-machine-charm

  machine-integration-test:
    needs:
      - machine-build
      - machine-build-kv-requirer
    uses: ./.github/workflows/machine-integration-test.yaml
    with:
      path: ./machine/
      vault-charm-artifact-name: ${{ needs.machine-build.outputs.artifacts-key }}
      kv-requirer-charm-artifact-name: kv-requirer-machine-charm

  machine-publish-charm:
    name: Publish Machine Charm
    runs-on: ubuntu-24.04
    needs:
      - machine-lint-report
      - machine-grafana-dashboard-lint-report
      - machine-static-analysis
      - machine-unit-tests-with-coverage
      - machine-integration-test
      - machine-build
      - machine-build-kv-requirer
    if: ${{ (github.ref_name == 'main' || startsWith(github.ref_name, 'release-')) && needs.machine-build.outputs.charm-paths != '' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download charm artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.machine-build.outputs.artifacts-key }}
          path: machine

      - name: Install charmcraft
        run: sudo snap install charmcraft --classic --channel latest/stable

      - name: Upload charm to Charmhub
        uses: canonical/charming-actions/upload-charm@2.7.0
        with:
          credentials: ${{ secrets.CHARMCRAFT_AUTH }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          channel: 1.16/edge
          destructive-mode: false
          charm-path: machine
          built-charm-path: ${{ needs.machine-build.outputs.charm-paths }}
          github-tag: true
          tag-prefix: machine
